<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#336791"/>

  <!-- Ear — drawn before head so head overlaps the inner edge naturally -->
  <ellipse cx="16" cy="22" rx="9" ry="12" fill="white" fill-opacity="0.93"/>
  <!-- Inner ear cut-out -->
  <ellipse cx="16" cy="22" rx="5.5" ry="7.5" fill="#336791"/>

  <!-- Head -->
  <ellipse cx="34" cy="24" rx="15" ry="17" fill="white" fill-opacity="0.93"/>

  <!-- Eye -->
  <circle cx="42" cy="18" r="2.8" fill="#336791"/>
  <circle cx="41.2" cy="17.2" r="0.9" fill="white"/>

  <!-- Trunk — emerges from lower-front of head, hangs down, tip curls right -->
  <path d="M 24 40
           C 21 44 19 49 20 54
           C 21 58 26 60 30 58
           C 34 56 34 51 32 47
           C 30 43 31 40 28 40
           Z"
        fill="white" fill-opacity="0.93"/>

  <!-- Trunk rings -->
  <path d="M 20 46 Q 25 45 31 46" fill="none" stroke="#336791" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 20 50 Q 25 49 31 50" fill="none" stroke="#336791" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 21 54 Q 25.5 53 30 54" fill="none" stroke="#336791" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Trunk tip curl -->
  <path d="M 30 58 C 33 59 36 58 35 55" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.93" stroke-linecap="round"/>
</svg>
